databaseChangeLog:
  - changeSet:
      id: 002-create-media-file-access-table
      author: vector
      changes:
        - createTable:
            tableName: media_file_access
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: media_file_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: media_file_access
            baseColumnNames: media_file_id
            referencedTableName: media_files
            referencedColumnNames: id
            constraintName: fk_media_file_access_media_file
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: media_file_access
            columnNames: media_file_id, account_id
            constraintName: uk_media_file_access_media_account
        - createIndex:
            tableName: media_file_access
            indexName: idx_media_file_access_media_file_id
            columns:
              - column:
                  name: media_file_id
        - createIndex:
            tableName: media_file_access
            indexName: idx_media_file_access_account_id
            columns:
              - column:
                  name: account_id
