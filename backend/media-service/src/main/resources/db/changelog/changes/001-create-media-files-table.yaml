databaseChangeLog:
  - changeSet:
      id: 001-create-media-files-table
      author: vector
      changes:
        - createTable:
            tableName: media_files
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uploader_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: chat_id
                  type: uuid
              - column:
                  name: storage_object_key
                  type: varchar(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: encrypted_size_bytes
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_sha256_base64
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamp with time zone
        - createIndex:
            tableName: media_files
            indexName: idx_media_files_uploader_account_id
            columns:
              - column:
                  name: uploader_account_id
        - createIndex:
            tableName: media_files
            indexName: idx_media_files_chat_id
            columns:
              - column:
                  name: chat_id
        - createIndex:
            tableName: media_files
            indexName: idx_media_files_status
            columns:
              - column:
                  name: status
