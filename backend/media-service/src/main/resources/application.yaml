server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: media-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/media_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:512MB}
      max-request-size: ${MAX_REQUEST_SIZE:512MB}
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: false

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    public-paths:
      - /actuator/health
      - /actuator/info
    jwt:
      issuer: ${JWT_ISSUER:identity-service}
      key-name: ${JWT_KEY_NAME:identity-service-jwt-ed25519}
  messaging-service:
    base-url: ${MESSAGING_SERVICE_BASE_URL:http://localhost:8087}
    chat-path: ${MESSAGING_SERVICE_CHAT_PATH:/api/v1/chats/{chatId}}
  media:
    storage:
      root-path: ${MEDIA_STORAGE_ROOT_PATH:./data/media-files}
      max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:536870912}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    redis-key-prefix: ${RATE_LIMIT_REDIS_KEY_PREFIX:vector:media-service:rate-limit}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:3000}
    window: ${RATE_LIMIT_WINDOW:60s}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:never}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    org.springframework.data.repository.config: WARN
    org.springframework.data.redis.repository.configuration: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    root: ${LOGGING_LEVEL_ROOT:INFO}
    dev.mediaservice: ${LOGGING_LEVEL_APP:INFO}
  pattern:
    level: "%5p [${spring.application.name}] [requestId:%X{requestId:-none}]"
