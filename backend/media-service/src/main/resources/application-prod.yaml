spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_URI}
      token: ${VAULT_TOKEN}

application:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    key-prefix: ${RATE_LIMIT_KEY_PREFIX:vector:media:rate-limit}
    requests-per-window: ${RATE_LIMIT_REQUESTS_PER_WINDOW:120}
    window: ${RATE_LIMIT_WINDOW:PT1M}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  messaging-service:
    base-url: ${MESSAGING_SERVICE_BASE_URL}
  media:
    storage:
      root-path: ${MEDIA_STORAGE_ROOT_PATH:/var/lib/vector/media-files}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    org.springframework.data.repository.config: WARN
    org.springframework.data.redis.repository.configuration: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    dev.mediaservice: INFO
