spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_URI}
      token: ${VAULT_TOKEN}

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  messaging-service:
    base-url: ${MESSAGING_SERVICE_BASE_URL}
  media:
    storage:
      root-path: ${MEDIA_STORAGE_ROOT_PATH:/var/lib/vector/media-files}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    dev.mediaservice: INFO
