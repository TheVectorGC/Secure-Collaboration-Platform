databaseChangeLog:
  - changeSet:
      id: 002-create-device-document-signing-keys-table
      author: document-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: device_document_signing_keys
      changes:
        - createTable:
            tableName: device_document_signing_keys
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: device_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: algorithm
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: public_key_base64
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: fingerprint
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: device_document_signing_keys
            indexName: idx_device_document_signing_keys_account_device
            columns:
              - column:
                  name: account_id
              - column:
                  name: device_id
