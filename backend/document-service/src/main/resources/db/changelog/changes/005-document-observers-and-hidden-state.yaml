databaseChangeLog:
  - changeSet:
      id: 005-document-observers-and-hidden-state
      author: document-service
      changes:
        - createTable:
            tableName: document_observers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: observer_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: document_observers
            columnNames: document_id, observer_account_id
            constraintName: uk_document_observers_document_account
        - createIndex:
            tableName: document_observers
            indexName: idx_document_observers_document_id
            columns:
              - column:
                  name: document_id
        - createIndex:
            tableName: document_observers
            indexName: idx_document_observers_observer_account_id
            columns:
              - column:
                  name: observer_account_id
        - createTable:
            tableName: document_hidden_accounts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: hidden_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: document_hidden_accounts
            columnNames: document_id, account_id
            constraintName: uk_document_hidden_accounts_document_account
        - createIndex:
            tableName: document_hidden_accounts
            indexName: idx_document_hidden_accounts_account_id
            columns:
              - column:
                  name: account_id
