databaseChangeLog:
  - changeSet:
      id: 006-create-document-hidden-accounts-table
      author: vector
      changes:
        - createTable:
            tableName: document_hidden_accounts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: hidden_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: document_hidden_accounts
            baseColumnNames: document_id
            referencedTableName: documents
            referencedColumnNames: id
            constraintName: fk_document_hidden_accounts_document_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: document_hidden_accounts
            columnNames: document_id, account_id
            constraintName: uk_document_hidden_accounts_document_account
