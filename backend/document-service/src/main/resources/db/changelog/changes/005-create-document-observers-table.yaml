databaseChangeLog:
  - changeSet:
      id: 005-create-document-observers-table
      author: vector
      changes:
        - createTable:
            tableName: document_observers
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: observer_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: document_observers
            baseColumnNames: document_id
            referencedTableName: documents
            referencedColumnNames: id
            constraintName: fk_document_observers_document_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: document_observers
            columnNames: document_id, observer_account_id
            constraintName: uk_document_observers_document_account
        - createIndex:
            tableName: document_observers
            indexName: idx_document_observers_account_created_at
            columns:
              - column:
                  name: observer_account_id
              - column:
                  name: created_at
