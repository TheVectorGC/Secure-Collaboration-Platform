databaseChangeLog:
  - changeSet:
      id: 003-create-document-signatures-table
      author: vector
      changes:
        - createTable:
            tableName: document_signatures
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: signer_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: signer_device_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: signing_key_fingerprint
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: algorithm
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: document_hash_base64
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: signature_base64
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: signed_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: document_signatures
            baseColumnNames: document_id
            referencedTableName: documents
            referencedColumnNames: id
            constraintName: fk_document_signatures_document_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: document_signatures
            columnNames: document_id, signer_account_id
            constraintName: uk_document_signatures_document_account
