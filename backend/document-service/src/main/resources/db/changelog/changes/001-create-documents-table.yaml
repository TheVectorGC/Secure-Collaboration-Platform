databaseChangeLog:
  - changeSet:
      id: 001-create-documents-table
      author: vector
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chat_id
                  type: uuid
              - column:
                  name: media_file_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: owner_account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(2000)
              - column:
                  name: file_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: plaintext_sha256_base64
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_sha256_base64
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: file_encryption_algorithm
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: file_initialization_vector_base64
                  type: varchar(512)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: rejected_by_account_id
                  type: uuid
              - column:
                  name: rejected_at
                  type: timestamp with time zone
              - column:
                  name: rejection_reason
                  type: varchar(1000)
              - column:
                  name: cancelled_by_account_id
                  type: uuid
              - column:
                  name: cancelled_at
                  type: timestamp with time zone
              - column:
                  name: cancellation_reason
                  type: varchar(1000)
        - createIndex:
            tableName: documents
            indexName: idx_documents_owner_created_at
            columns:
              - column:
                  name: owner_account_id
              - column:
                  name: created_at
        - createIndex:
            tableName: documents
            indexName: idx_documents_chat_created_at
            columns:
              - column:
                  name: chat_id
              - column:
                  name: created_at
