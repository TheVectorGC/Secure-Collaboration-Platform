databaseChangeLog:
  - changeSet:
      id: 001-create-documents-table
      author: document-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: documents
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chat_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: media_file_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: owner_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: plaintext_sha256_base64
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_sha256_base64
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: rejected_by_account_id
                  type: UUID
              - column:
                  name: rejected_at
                  type: TIMESTAMP WITH TIME ZONE
        - createIndex:
            tableName: documents
            indexName: idx_documents_chat_id
            columns:
              - column:
                  name: chat_id
        - createIndex:
            tableName: documents
            indexName: idx_documents_owner_account_id
            columns:
              - column:
                  name: owner_account_id
