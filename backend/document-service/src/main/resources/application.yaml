server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: document-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5437/document_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: false

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    public-paths:
      - /actuator/health
      - /actuator/info
    jwt:
      issuer: ${JWT_ISSUER:identity-service}
      key-name: ${JWT_KEY_NAME:identity-service-jwt-ed25519}
  kafka:
    topics:
      document-events: ${DOCUMENT_EVENTS_TOPIC:document.events}
  outbox:
    enabled: ${DOCUMENT_OUTBOX_ENABLED:true}
    batch-size: ${DOCUMENT_OUTBOX_BATCH_SIZE:50}
    dispatch-interval: ${DOCUMENT_OUTBOX_DISPATCH_INTERVAL:PT1S}
    max-attempts: ${DOCUMENT_OUTBOX_MAX_ATTEMPTS:10}
  messaging-service:
    base-url: ${MESSAGING_SERVICE_BASE_URL:http://localhost:8087}
    chat-path: ${MESSAGING_SERVICE_CHAT_PATH:/api/v1/chats/{chatId}}
    current-chats-path: ${MESSAGING_SERVICE_CURRENT_CHATS_PATH:/api/v1/chats}
  media-service:
    base-url: ${MEDIA_SERVICE_BASE_URL:http://localhost:8089}
    grant-access-path: ${MEDIA_SERVICE_GRANT_ACCESS_PATH:/api/v1/media/files/{mediaFileId}/access}
  identity-service:
    base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:8085}
    internal-device-path: ${IDENTITY_SERVICE_INTERNAL_DEVICE_PATH:/api/v1/devices/{deviceId}/internal}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    redis-key-prefix: ${RATE_LIMIT_REDIS_KEY_PREFIX:vector:document-service:rate-limit}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:3000}
    window: ${RATE_LIMIT_WINDOW:60s}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:never}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    org.springframework.data.repository.config: WARN
    org.springframework.data.redis.repository.configuration: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    root: ${LOGGING_LEVEL_ROOT:INFO}
    dev.documentservice: ${LOGGING_LEVEL_APP:INFO}
  pattern:
    level: "%5p [${spring.application.name}] [requestId:%X{requestId:-none}]"
