services:
  document-postgres:
    image: postgres:17
    container_name: document-postgres
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - document-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_db"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  document-postgres-data:
