services:
  document-postgres:
    image: postgres:18
    container_name: document-postgres
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - document-postgres-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_db"]
      interval: 5s
      timeout: 3s
      retries: 30

  document-redis:
    image: redis:8
    container_name: document-redis
    ports:
      - "6385:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - document-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  document-postgres-pg18-data:
  document-redis-data:
