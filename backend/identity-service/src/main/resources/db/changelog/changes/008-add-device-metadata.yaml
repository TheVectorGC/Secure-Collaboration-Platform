databaseChangeLog:
  - changeSet:
      id: 008-add-device-metadata
      author: identity-service
      changes:
        - addColumn:
            tableName: devices
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: os_name
                  type: VARCHAR(120)
              - column:
                  name: os_version
                  type: VARCHAR(120)
              - column:
                  name: architecture
                  type: VARCHAR(64)
              - column:
                  name: hostname
                  type: VARCHAR(120)
              - column:
                  name: device_fingerprint
                  type: VARCHAR(128)

        - sql:
            sql: UPDATE devices SET updated_at = created_at WHERE updated_at IS NULL

        - addNotNullConstraint:
            tableName: devices
            columnName: updated_at
            columnDataType: TIMESTAMP WITH TIME ZONE
