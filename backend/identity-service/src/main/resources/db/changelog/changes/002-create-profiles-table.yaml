databaseChangeLog:
  - changeSet:
      id: 002-create-profiles-table
      author: identity-service
      changes:
        - createTable:
            tableName: profiles
            columns:
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: VARCHAR(100)
              - column:
                  name: avatar_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_file_id
                  type: UUID
              - column:
                  name: avatar_data_url
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: profiles
            baseColumnNames: account_id
            constraintName: fk_profiles_accounts
            referencedTableName: accounts
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            tableName: profiles
            indexName: idx_profiles_first_name
            columns:
              - column:
                  name: first_name
        - createIndex:
            tableName: profiles
            indexName: idx_profiles_last_name
            columns:
              - column:
                  name: last_name
