databaseChangeLog:
  - changeSet:
      id: 007-create-outbox-events-table
      author: identity-service
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: TEXT
              - column:
                  name: next_attempt_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: TIMESTAMP WITH TIME ZONE
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status_next_attempt
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_aggregate
            columns:
              - column:
                  name: aggregate_type
              - column:
                  name: aggregate_id
