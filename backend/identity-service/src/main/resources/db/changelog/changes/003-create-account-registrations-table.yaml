databaseChangeLog:
  - changeSet:
      id: 003-create-account-registrations-table
      author: identity-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: account_registrations
      changes:
        - createTable:
            tableName: account_registrations
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: email
                  type: VARCHAR(320)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: middle_name
                  type: VARCHAR(100)

              - column:
                  name: registration_token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: completed_at
                  type: TIMESTAMP WITH TIME ZONE

        - createIndex:
            tableName: account_registrations
            indexName: idx_account_registrations_token_hash
            columns:
              - column:
                  name: registration_token_hash

        - createIndex:
            tableName: account_registrations
            indexName: idx_account_registrations_status
            columns:
              - column:
                  name: status