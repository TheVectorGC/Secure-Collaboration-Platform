databaseChangeLog:
  - changeSet:
      id: 007-add-profile-avatar-data-url
      author: identity-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: profiles
              columnName: avatar_data_url
      changes:
        - addColumn:
            tableName: profiles
            columns:
              - column:
                  name: avatar_data_url
                  type: TEXT
