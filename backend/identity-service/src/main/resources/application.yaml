server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/identity_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: false

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    public-paths:
      - /api/v1/auth/**
      - /actuator/health
      - /actuator/info
    jwt:
      issuer: ${JWT_ISSUER:identity-service}
      key-name: ${JWT_KEY_NAME:identity-service-jwt-ed25519}
      access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:15m}
    refresh-token:
      expiration: ${REFRESH_TOKEN_EXPIRATION:30d}
  initial-admin:
    enabled: ${INITIAL_ADMIN_ENABLED:false}
    username: ${INITIAL_ADMIN_USERNAME:admin}
    email: ${INITIAL_ADMIN_EMAIL:admin@company.local}
    password: ${INITIAL_ADMIN_PASSWORD:InitialPassword123!}
    first-name: ${INITIAL_ADMIN_FIRST_NAME:System}
    last-name: ${INITIAL_ADMIN_LAST_NAME:Administrator}
  outbox:
    enabled: ${OUTBOX_ENABLED:false}
    topic: ${IDENTITY_EVENTS_TOPIC:identity.events}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    dispatch-interval: ${OUTBOX_DISPATCH_INTERVAL:PT5S}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    redis-key-prefix: ${RATE_LIMIT_REDIS_KEY_PREFIX:vector:identity-service:rate-limit}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:3000}
    window: ${RATE_LIMIT_WINDOW:60s}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:never}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    org.springframework.data.repository.config: WARN
    org.springframework.data.redis.repository.configuration: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    root: ${LOGGING_LEVEL_ROOT:INFO}
    dev.identityservice: ${LOGGING_LEVEL_APP:INFO}
  pattern:
    level: "%5p [${spring.application.name}] [requestId:%X{requestId:-none}]"
