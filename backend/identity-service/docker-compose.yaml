services:
  identity-postgres:
    image: postgres:18
    container_name: identity-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - identity-postgres-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity_db"]
      interval: 5s
      timeout: 3s
      retries: 30

  identity-redis:
    image: redis:8
    container_name: identity-redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - identity-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka-backend:
    image: apache/kafka:3.9.1
    container_name: kafka-backend
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-backend:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-backend:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-backend-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka-backend-init:
    image: apache/kafka:3.9.1
    container_name: kafka-backend-init
    depends_on:
      kafka-backend:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-backend:29092 --create --if-not-exists --topic identity.events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-backend:29092 --create --if-not-exists --topic messaging.events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-backend:29092 --create --if-not-exists --topic document.events --partitions 1 --replication-factor 1

  kafka-ui-backend:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-backend
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: backend-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-backend:29092
    depends_on:
      kafka-backend-init:
        condition: service_completed_successfully

  vault-backend:
    image: hashicorp/vault:1.17
    container_name: vault-backend
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  vault-backend-init:
    image: hashicorp/vault:1.17
    container_name: vault-backend-init
    depends_on:
      vault-backend:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault-backend:8200
      VAULT_TOKEN: root
      JWT_TRANSIT_KEY_NAME: identity-service-jwt-ed25519
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        if ! vault secrets list -format=json | grep -q '"transit/"'; then
          vault secrets enable transit
        fi
        if ! vault read "transit/keys/$${JWT_TRANSIT_KEY_NAME}" >/dev/null 2>&1; then
          vault write -f "transit/keys/$${JWT_TRANSIT_KEY_NAME}" type=ed25519 exportable=false allow_plaintext_backup=false
        fi

volumes:
  identity-postgres-pg18-data:
  identity-redis-data:
  kafka-backend-data:
