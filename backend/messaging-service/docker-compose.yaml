services:
  messaging-postgres:
    image: postgres:18
    container_name: messaging-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: messaging_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - messaging-postgres-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messaging_db"]
      interval: 5s
      timeout: 3s
      retries: 30

  messaging-redis:
    image: redis:8
    container_name: messaging-redis
    ports:
      - "6382:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - messaging-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  messaging-postgres-pg18-data:
  messaging-redis-data:
