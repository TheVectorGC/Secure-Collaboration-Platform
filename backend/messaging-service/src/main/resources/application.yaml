server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: messaging-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/messaging_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:messaging-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

application:
  identity-service:
    base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:8085}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    jwt:
      issuer: ${JWT_ISSUER:identity-service}
      key-name: ${JWT_KEY_NAME:identity-service-jwt-ed25519}
  kafka:
    topics:
      messaging-events: ${MESSAGING_EVENTS_TOPIC:messaging.events}
      identity-events: ${IDENTITY_EVENTS_TOPIC:identity.events}
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    dispatch-interval-ms: ${OUTBOX_DISPATCH_INTERVAL_MS:1000}
    retry-delay-seconds: ${OUTBOX_RETRY_DELAY_SECONDS:10}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:20}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [${spring.application.name:messaging-service}] [requestId=%X{requestId:-none}]"
  level:
    dev.messagingservice: INFO
    org.springframework.kafka: INFO
