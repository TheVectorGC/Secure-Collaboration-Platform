databaseChangeLog:
  - changeSet:
      id: 011-create-message-reactions-table
      author: messaging-service
      changes:
        - createTable:
            tableName: message_reactions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: emoji
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: message_reactions
            baseColumnNames: message_id
            constraintName: fk_message_reactions_messages
            referencedTableName: messages
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: message_reactions
            columnNames: message_id, account_id
            constraintName: uq_message_reactions_message_account
        - createIndex:
            tableName: message_reactions
            indexName: idx_message_reactions_message
            columns:
              - column:
                  name: message_id
        - createIndex:
            tableName: message_reactions
            indexName: idx_message_reactions_account
            columns:
              - column:
                  name: account_id
