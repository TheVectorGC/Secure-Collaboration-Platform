databaseChangeLog:
  - changeSet:
      id: 009-add-chat-avatar-data-url
      author: messaging-service
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: chats
        - not:
            columnExists:
              tableName: chats
              columnName: avatar_data_url
      changes:
        - addColumn:
            tableName: chats
            columns:
              - column:
                  name: avatar_data_url
                  type: TEXT
