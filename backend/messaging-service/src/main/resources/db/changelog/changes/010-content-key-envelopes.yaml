databaseChangeLog:
  - changeSet:
      id: 010-content-key-envelopes
      author: messaging-service
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: messages
      changes:
        - addColumn:
            tableName: messages
            columns:
              - column:
                  name: content_algorithm
                  type: VARCHAR(64)
              - column:
                  name: content_initialization_vector_base64
                  type: VARCHAR(512)
              - column:
                  name: content_authentication_tag_base64
                  type: VARCHAR(512)
              - column:
                  name: group_key_epoch
                  type: INTEGER
        - createTable:
            tableName: message_account_key_envelopes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: target_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: algorithm
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_key_base64
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: message_account_key_envelopes
            baseColumnNames: message_id
            constraintName: fk_message_account_key_envelopes_messages
            referencedTableName: messages
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: message_account_key_envelopes
            columnNames: message_id, target_account_id
            constraintName: uq_message_account_key_envelopes_message_account
        - createIndex:
            tableName: message_account_key_envelopes
            indexName: idx_message_account_key_envelopes_account
            columns:
              - column:
                  name: target_account_id
              - column:
                  name: message_id
        - createTable:
            tableName: group_epoch_key_envelopes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chat_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: epoch
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: target_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: sender_device_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: algorithm
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_key_base64
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: group_epoch_key_envelopes
            columnNames: chat_id, epoch, target_account_id
            constraintName: uq_group_epoch_key_envelopes_chat_epoch_account
        - createIndex:
            tableName: group_epoch_key_envelopes
            indexName: idx_group_epoch_key_envelopes_account
            columns:
              - column:
                  name: target_account_id
              - column:
                  name: chat_id
              - column:
                  name: epoch
