databaseChangeLog:
  - changeSet:
      id: 005-create-message-device-payloads-table
      author: messaging-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: message_device_payloads
      changes:
        - createTable:
            tableName: message_device_payloads
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: target_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: target_device_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: ciphertext_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: message_device_payloads
            baseColumnNames: message_id
            constraintName: fk_message_device_payloads_messages
            referencedTableName: messages
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: message_device_payloads
            columnNames: message_id, target_device_id
            constraintName: uq_message_device_payloads_message_device
        - createIndex:
            tableName: message_device_payloads
            indexName: idx_message_device_payloads_message_id
            columns:
              - column:
                  name: message_id
        - createIndex:
            tableName: message_device_payloads
            indexName: idx_message_device_payloads_target_account_device
            columns:
              - column:
                  name: target_account_id
              - column:
                  name: target_device_id
