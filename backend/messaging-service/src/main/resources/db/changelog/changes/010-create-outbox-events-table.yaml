databaseChangeLog:
  - changeSet:
      id: 010-create-outbox-events-table
      author: messaging-service
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: topic
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: event_key
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: payload_json
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: TIMESTAMP WITH TIME ZONE
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status_next_attempt
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_event_type
            columns:
              - column:
                  name: event_type
