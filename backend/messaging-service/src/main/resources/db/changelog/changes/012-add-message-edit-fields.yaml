databaseChangeLog:
  - changeSet:
      id: 012-add-message-edit-fields
      author: messaging-service
      changes:
        - addColumn:
            tableName: messages
            columns:
              - column:
                  name: edited_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: edit_version
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
