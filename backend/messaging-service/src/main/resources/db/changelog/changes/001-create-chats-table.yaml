databaseChangeLog:
  - changeSet:
      id: 001-create-chats-table
      author: messaging-service
      changes:
        - createTable:
            tableName: chats
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
              - column:
                  name: avatar_data_url
                  type: TEXT
              - column:
                  name: direct_chat_key
                  type: VARCHAR(80)
                  constraints:
                    unique: true
              - column:
                  name: self_account_id
                  type: UUID
                  constraints:
                    unique: true
              - column:
                  name: current_key_epoch
                  type: INTEGER
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: created_by_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: chats
            indexName: idx_chats_type
            columns:
              - column:
                  name: type
        - createIndex:
            tableName: chats
            indexName: idx_chats_updated_at
            columns:
              - column:
                  name: updated_at
