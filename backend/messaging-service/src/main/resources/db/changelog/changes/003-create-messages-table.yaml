databaseChangeLog:
  - changeSet:
      id: 003-create-messages-table
      author: messaging-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: messages
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chat_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: sender_account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: sender_device_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: client_message_id
                  type: VARCHAR(100)
              - column:
                  name: message_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: encryption_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_payload
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: messages
            baseColumnNames: chat_id
            constraintName: fk_messages_chats
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: messages
            columnNames: sender_account_id, client_message_id
            constraintName: uq_messages_sender_client_message
        - createIndex:
            tableName: messages
            indexName: idx_messages_chat_created_at
            columns:
              - column:
                  name: chat_id
              - column:
                  name: created_at
        - createIndex:
            tableName: messages
            indexName: idx_messages_sender_account_id
            columns:
              - column:
                  name: sender_account_id
