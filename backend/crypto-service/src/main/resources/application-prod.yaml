spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI}
      token: ${VAULT_TOKEN}

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    public-paths:
      - /actuator/health
      - /actuator/info
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    redis-key-prefix: ${RATE_LIMIT_REDIS_KEY_PREFIX:vector:crypto-service:rate-limit}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:3000}
    window: ${RATE_LIMIT_WINDOW:60s}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    dev.cryptoservice: INFO
