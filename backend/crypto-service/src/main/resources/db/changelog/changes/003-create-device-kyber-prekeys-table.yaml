databaseChangeLog:
  - changeSet:
      id: 003-create-device-kyber-prekeys-table
      author: crypto-service
      changes:
        - createTable:
            tableName: device_kyber_prekeys
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: device_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: key_id
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: public_key
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: signature
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
        - addUniqueConstraint:
            tableName: device_kyber_prekeys
            columnNames: device_id, key_id
            constraintName: uq_device_kyber_prekeys_device_key_id
        - createIndex:
            tableName: device_kyber_prekeys
            indexName: idx_device_kyber_prekeys_device_status
            columns:
              - column:
                  name: device_id
              - column:
                  name: status
