databaseChangeLog:
  - changeSet:
      id: 001-create-device-identity-keys-table
      author: crypto-service
      changes:
        - createTable:
            tableName: device_identity_keys
            columns:
              - column:
                  name: device_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: registration_id
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: public_key
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: fingerprint
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: device_identity_keys
            columnNames: fingerprint
            constraintName: uq_device_identity_keys_fingerprint
