databaseChangeLog:
  - changeSet:
      id: 006-add-device-identity-registration-id
      author: vector
      changes:
        - addColumn:
            tableName: device_identity_keys
            columns:
              - column:
                  name: registration_id
                  type: int
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
        - dropDefaultValue:
            tableName: device_identity_keys
            columnName: registration_id

  - changeSet:
      id: 006-create-device-kyber-prekeys
      author: vector
      changes:
        - createTable:
            tableName: device_kyber_prekeys
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: device_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: key_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: public_key
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: signature
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: timestamptz
              - column:
                  name: expires_at
                  type: timestamptz
        - addUniqueConstraint:
            tableName: device_kyber_prekeys
            columnNames: device_id, key_id
            constraintName: ux_device_kyber_prekeys_device_key
        - createIndex:
            tableName: device_kyber_prekeys
            indexName: idx_device_kyber_prekeys_device_status
            columns:
              - column:
                  name: device_id
              - column:
                  name: status
