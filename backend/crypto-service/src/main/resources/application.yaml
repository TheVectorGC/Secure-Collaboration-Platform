server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful

spring:
  application:
    name: crypto-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/crypto_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: false

application:
  identity-service:
    base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:8085}
    internal-device-path: ${IDENTITY_SERVICE_INTERNAL_DEVICE_PATH:/api/v1/devices/{deviceId}/internal}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    public-paths: ${SECURITY_PUBLIC_PATHS:/actuator/health,/actuator/info,/swagger-ui/**,/v3/api-docs/**}
    jwt:
      issuer: ${JWT_ISSUER:identity-service}
      key-name: ${JWT_KEY_NAME:identity-service-jwt-ed25519}
  crypto:
    prekey:
      low-threshold: ${PREKEY_LOW_THRESHOLD:20}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:never}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    dev.cryptoservice: ${LOGGING_LEVEL_APP:INFO}
  pattern:
    level: "%5p [requestId:%X{requestId:-none}]"
