spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_URI}
      token: ${VAULT_TOKEN}

application:
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    dev.realtimegateway: INFO
    org.springframework.kafka: WARN
