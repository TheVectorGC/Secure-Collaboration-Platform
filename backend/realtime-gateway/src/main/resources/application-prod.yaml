spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI}
      token: ${VAULT_TOKEN}

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS}
  security:
    public-paths:
      - /ws/**
      - /api/v1/realtime/info
      - /actuator/health
      - /actuator/info

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    dev.realtimegateway: INFO
