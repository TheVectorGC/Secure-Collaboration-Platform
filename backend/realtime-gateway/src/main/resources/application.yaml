server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: realtime-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
    repositories:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:realtime-gateway}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:latest}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root}
      kv:
        enabled: false

application:
  security:
    jwt:
      issuer: ${JWT_ISSUER:identity-service}
      key-name: ${JWT_KEY_NAME:identity-service-jwt-ed25519}
  kafka:
    topics:
      messaging-events: ${MESSAGING_EVENTS_TOPIC:messaging.events}
      document-events: ${DOCUMENT_EVENTS_TOPIC:document.events}
  websocket:
    endpoint: ${WEBSOCKET_ENDPOINT:/ws}
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}
  presence:
    redis-key-prefix: ${PRESENCE_REDIS_KEY_PREFIX:vector:presence}
    online-ttl: ${PRESENCE_ONLINE_TTL:90s}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [${spring.application.name:realtime-gateway}] [requestId=%X{requestId:-none}]"
  level:
    org.springframework.data.repository.config: WARN
    org.springframework.data.redis.repository.configuration: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    dev.realtimegateway: INFO
