services:
  identity-db:
    image: postgres:18
    container_name: vector-identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - identity-db-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 30

  crypto-db:
    image: postgres:18
    container_name: vector-crypto-db
    environment:
      POSTGRES_DB: crypto_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - crypto-db-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_db"]
      interval: 10s
      timeout: 5s
      retries: 30

  messaging-db:
    image: postgres:18
    container_name: vector-messaging-db
    environment:
      POSTGRES_DB: messaging_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - messaging-db-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messaging_db"]
      interval: 10s
      timeout: 5s
      retries: 30

  media-db:
    image: postgres:18
    container_name: vector-media-db
    environment:
      POSTGRES_DB: media_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - media-db-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_db"]
      interval: 10s
      timeout: 5s
      retries: 30

  document-db:
    image: postgres:18
    container_name: vector-document-db
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - document-db-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_db"]
      interval: 10s
      timeout: 5s
      retries: 30

  identity-redis:
    image: redis:8
    container_name: vector-identity-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - identity-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  crypto-redis:
    image: redis:8
    container_name: vector-crypto-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6381:6379"
    volumes:
      - crypto-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  messaging-redis:
    image: redis:8
    container_name: vector-messaging-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6382:6379"
    volumes:
      - messaging-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  realtime-redis:
    image: redis:8
    container_name: vector-realtime-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6383:6379"
    volumes:
      - realtime-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  media-redis:
    image: redis:8
    container_name: vector-media-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6384:6379"
    volumes:
      - media-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  document-redis:
    image: redis:8
    container_name: vector-document-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6385:6379"
    volumes:
      - document-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  vault:
    image: hashicorp/vault:1.17
    container_name: vector-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  vault-init:
    image: hashicorp/vault:1.17
    container_name: vector-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      JWT_TRANSIT_KEY_NAME: identity-service-jwt-ed25519
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        if ! vault secrets list -format=json | grep -q '"transit/"'; then
          vault secrets enable transit
        fi
        if ! vault read "transit/keys/$${JWT_TRANSIT_KEY_NAME}" >/dev/null 2>&1; then
          vault write -f "transit/keys/$${JWT_TRANSIT_KEY_NAME}" type=ed25519 exportable=false allow_plaintext_backup=false
        fi

  kafka:
    image: apache/kafka:3.9.1
    container_name: vector-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: vector-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic identity.events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic messaging.events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic document.events --partitions 1 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vector-kafka-ui
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_CLUSTERS_0_NAME: vector-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "9090:8080"

  identity-service:
    build:
      context: ./identity-service
    container_name: vector-identity-service
    depends_on:
      identity-redis:
        condition: service_healthy
      identity-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://identity-db:5432/identity_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root
      INITIAL_ADMIN_ENABLED: true
      OUTBOX_ENABLED: true
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_HOST: identity-redis
      REDIS_PORT: 6379
      RATE_LIMIT_ENABLED: true
    ports:
      - "8085:8085"

  crypto-service:
    build:
      context: ./crypto-service
    container_name: vector-crypto-service
    depends_on:
      crypto-redis:
        condition: service_healthy
      crypto-db:
        condition: service_healthy
      identity-service:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://crypto-db:5432/crypto_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8085
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_HOST: crypto-redis
      REDIS_PORT: 6379
      RATE_LIMIT_ENABLED: true
    ports:
      - "8086:8086"

  messaging-service:
    build:
      context: ./messaging-service
    container_name: vector-messaging-service
    depends_on:
      messaging-redis:
        condition: service_healthy
      messaging-db:
        condition: service_healthy
      identity-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8087
      DB_URL: jdbc:postgresql://messaging-db:5432/messaging_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8085
      OUTBOX_ENABLED: true
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_HOST: messaging-redis
      REDIS_PORT: 6379
      RATE_LIMIT_ENABLED: true
    ports:
      - "8087:8087"

  realtime-gateway:
    build:
      context: ./realtime-gateway
    container_name: vector-realtime-gateway
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      realtime-redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8088
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: realtime-redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      WEBSOCKET_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8088:8088"

  media-service:
    build:
      context: ./media-service
    container_name: vector-media-service
    depends_on:
      media-redis:
        condition: service_healthy
      media-db:
        condition: service_healthy
      messaging-service:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8089
      DB_URL: jdbc:postgresql://media-db:5432/media_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root
      MESSAGING_SERVICE_BASE_URL: http://messaging-service:8087
      MEDIA_STORAGE_ROOT_PATH: /var/lib/vector/media-files
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_HOST: media-redis
      REDIS_PORT: 6379
      RATE_LIMIT_ENABLED: true
    ports:
      - "8089:8089"
    volumes:
      - media-files:/var/lib/vector/media-files

  document-service:
    build:
      context: ./document-service
    container_name: vector-document-service
    depends_on:
      document-redis:
        condition: service_healthy
      document-db:
        condition: service_healthy
      identity-service:
        condition: service_started
      messaging-service:
        condition: service_started
      media-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090
      DB_URL: jdbc:postgresql://document-db:5432/document_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8085
      MESSAGING_SERVICE_BASE_URL: http://messaging-service:8087
      MEDIA_SERVICE_BASE_URL: http://media-service:8089
      DOCUMENT_OUTBOX_ENABLED: true
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_HOST: document-redis
      REDIS_PORT: 6379
      RATE_LIMIT_ENABLED: true
    ports:
      - "8090:8090"

volumes:
  identity-db-pg18-data:
  crypto-db-pg18-data:
  messaging-db-pg18-data:
  media-db-pg18-data:
  document-db-pg18-data:
  identity-redis-data:
  crypto-redis-data:
  messaging-redis-data:
  realtime-redis-data:
  media-redis-data:
  document-redis-data:
  kafka-data:
  media-files:
