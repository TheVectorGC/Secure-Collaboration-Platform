databaseChangeLog:
  - changeSet:
      id: 001-create-device-identity-keys-table
      author: crypto-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: device_identity_keys
      changes:
        - createTable:
            tableName: device_identity_keys
            columns:
              - column:
                  name: device_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: public_key
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: fingerprint
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - createIndex:
            tableName: device_identity_keys
            indexName: idx_device_identity_keys_fingerprint
            columns:
              - column:
                  name: fingerprint
